<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.11.0/mammoth.browser.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no">
    <title>PDF Scanner</title>
    <link rel="stylesheet" href="pdf.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico">
    <script src="keywords.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then(reg => console.log('[App] Service Worker registered'))
                .catch(err => console.error('[App] Service Worker failed:', err));
        }
    </script>
</head>
<body>

<div id="sidebar" class="sidebar">
    <div class="header">
        <div class="header-main-row">
            <label class="btn-open">
                <svg class="btn-open-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h4l2 2h6a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>
                Open Folder
                <input type="file" id="folderInput" webkitdirectory directory multiple accept=".pdf,.docx,.doc" style="display:none">
            </label>
            <button class="btn-icon" id="settingsBtn" onclick="toggleSettings()" title="Settings">&#9881;</button>
            <button class="btn-icon btn-icon-danger" onclick="clearAllResults()" title="Clear all">&#10005;</button>
        </div>
        <button class="mobile-toggle-sidebar" onclick="toggleMobileSidebar()" title="Toggle sidebar" style="display:none;">☰</button>
        <div class="keyword-row">
            <button class="btn-icon btn-icon-sm" onclick="toggleKeywordManager()" title="Manage keyword lists">&#9881;</button>
            <select class="list-select" id="keywordListSelect" title="Keyword list"></select>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status-bar" id="statusBar"></div>
    </div>

    

    <div id="results" class="results-area">
        <h1 class="status-msg">&#10548;</h1>
        <h1 class="status-msg">Drop a folder to begin scanning</h1>
    </div>


    <div class="attribution">
        Kevin Henderson - <b>24/04/2026 - </b>
        <a href="https://github.com/kvnhndrsn/kwpdf">kwpdf</a>
    </div>
</div>

<div id="resizer"></div>

<div class="viewer-container">
    <div class="viewer-toolbar">
        <div class="toolbar-section toolbar-zoom">
            <button onclick="zoomOut()" title="Zoom Out (Ctrl+-)">-</button>
            <span class="zoom-level" id="zoomLevel">100%</span>
            <button onclick="zoomIn()" title="Zoom In (Ctrl++)">+</button>
            <button onclick="zoomFit()" title="Fit Width">Fit</button>
            <button onclick="zoomActual()" title="Actual Size">1:1</button>
        </div>
        <div class="toolbar-section toolbar-page">
            <button onclick="prevPage()" title="Previous page">&#8592;</button>
            <input type="number" class="page-input small" id="pageInput" min="1" placeholder="0" title="Go to page (G)">
            <span class="dim">/ <span id="pageTotal">0</span></span>
            <button onclick="nextPage()" title="Next page">&#8594;</button>
        </div>
        <div class="toolbar-section toolbar-keyword" id="navGroup">
            <span class="separator" id="navSep" style="display:none;">|</span>
            <button onclick="showSearchOverlay()" class="search-toggle-btn" title="Search (Ctrl+F)">⌕</button>
            <select class="keyword-select small" id="keywordSelect" title="Keyword"></select>
            <button onclick="findPrev()" title="Previous match">&#8592;</button>
            <input type="number" class="match-input small" id="matchInput" min="1" placeholder="0" title="Go to match number">
            <span class="dim">/ <span id="matchTotal">0</span></span>
            <button onclick="findNext()" title="Next match">&#8594;</button>
            <button class="nav-clear" onclick="clearSearch()" title="Clear search">&#10005;</button>
        </div>
    </div>

    <div class="viewer-scroll" id="viewerScroll">
        <div id="viewerDropMsg">&#10548; Drop a folder to begin scanning</div>
        <div id="viewerLoader">
            <div class="spinner"></div>
            <div class="loader-details">
                <div class="loader-filename" id="loaderFilename">Loading PDF...</div>
                <div class="loader-status" id="loaderStatus"></div>
                <div class="loader-progress-bar"><div class="loader-progress-fill" id="loaderProgressFill"></div></div>
            </div>
        </div>
        <div id="pdfViewer"></div>
    </div>
</div>

<div id="keywordManager">
    <div class="modal">
        <h3 style="color: #f5f5f5;">Manage Keywords</h3>
        <div class="keyword-list-header">
            <select id="listSelector" onchange="loadListIntoEditor()"></select>
            <button onclick="showNewListDialog()" class="btn-action" style="flex:none; width:80px;">+ New</button>
            <button onclick="deleteCurrentList()" id="deleteListBtn" class="btn-action" style="flex:none; width:80px; background:#c0392b;">Delete</button>
        </div>
        <p class="list-info" id="listInfo" style="color: #d4d4d4;"></p>
        <textarea id="keywordInput" style="width: 360px; height: 247px;"></textarea>
        <div class="modal-footer">
            <div style="display:flex;gap:8px;">
                <button onclick="exportKeywords()" class="btn-action" style="flex:none; width:80px;">Export</button>
                <button onclick="importKeywords()" class="btn-action" style="flex:none; width:80px;">Import</button>
            </div>
            <div style="display:flex;gap:8px;">
                <button onclick="toggleKeywordManager()" class="btn-action" style="flex:none; width:80px;">Cancel</button>
                <button onclick="saveCurrentList()" class="btn-action" style="flex:none; width:100px; background:var(--green); color:white; border:none;">Save & Apply</button>
            </div>
        </div>
    </div>
</div>

<div id="newListDialog">
    <div class="modal">
        <h3>New Keyword List</h3>
        <input type="text" id="newListName" placeholder="List name" onkeydown="if(event.key==='Enter')createNewList()">
        <div class="modal-footer">
            <button onclick="hideNewListDialog()" class="btn-action" style="flex:none; width:100px;">Cancel</button>
            <button onclick="createNewList()" class="btn-action" style="flex:none; width:80px; background:var(--green); color:white; border:none;">Create</button>
        </div>
    </div>
</div>

<script src="ui.js"></script>
    <script src="file_handler.js"></script>
    <script src="pdf.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</body>
</html>
